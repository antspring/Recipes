name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run.
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
  pull_request:
    branches:
      - master
    paths:
      - infra/terraform/**
      - .github/workflows/terraform.yml

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: infra/terraform

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    env:
      YC_SERVICE_ACCOUNT_KEY_FILE: ${{ runner.temp }}/yc-key.json

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Write Yandex Cloud service account key
        shell: bash
        run: |
          printf '%s' '${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}' > "$YC_SERVICE_ACCOUNT_KEY_FILE"
          chmod 600 "$YC_SERVICE_ACCOUNT_KEY_FILE"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY || 'recipes/dev/terraform.tfstate' }}" \
            -backend-config="access_key=${{ secrets.TF_STATE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.TF_STATE_SECRET_KEY }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_zone: ${{ secrets.YC_ZONE || 'ru-central1-a' }}
          TF_VAR_service_account_key_file: ${{ env.YC_SERVICE_ACCOUNT_KEY_FILE }}
          TF_VAR_ssh_public_key: ${{ secrets.YC_SSH_PUBLIC_KEY }}
          TF_VAR_allowed_ssh_cidrs: ${{ secrets.YC_ALLOWED_SSH_CIDRS }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          TF_VAR_dockerhub_namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_deployment_version: ${{ github.run_id }}-${{ github.sha }}
          TF_VAR_postgresql_connection_string: ${{ secrets.POSTGRESQL_CONNECTION_STRING }}
          TF_VAR_jwt_issuer: ${{ secrets.JWT_ISSUER }}
          TF_VAR_jwt_audience: ${{ secrets.JWT_AUDIENCE }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
          TF_VAR_object_storage_bucket: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          TF_VAR_object_storage_access_key: ${{ secrets.OBJECT_STORAGE_ACCESS_KEY }}
          TF_VAR_object_storage_secret_key: ${{ secrets.OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_smtp_host: ${{ secrets.SMTP_HOST }}
          TF_VAR_smtp_username: ${{ secrets.SMTP_USERNAME }}
          TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD }}
          TF_VAR_smtp_from_email: ${{ secrets.SMTP_FROM_EMAIL }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        env:
          TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_zone: ${{ secrets.YC_ZONE || 'ru-central1-a' }}
          TF_VAR_service_account_key_file: ${{ env.YC_SERVICE_ACCOUNT_KEY_FILE }}
          TF_VAR_ssh_public_key: ${{ secrets.YC_SSH_PUBLIC_KEY }}
          TF_VAR_allowed_ssh_cidrs: ${{ secrets.YC_ALLOWED_SSH_CIDRS }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          TF_VAR_dockerhub_namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_deployment_version: ${{ github.run_id }}-${{ github.sha }}
          TF_VAR_postgresql_connection_string: ${{ secrets.POSTGRESQL_CONNECTION_STRING }}
          TF_VAR_jwt_issuer: ${{ secrets.JWT_ISSUER }}
          TF_VAR_jwt_audience: ${{ secrets.JWT_AUDIENCE }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
          TF_VAR_object_storage_bucket: ${{ secrets.OBJECT_STORAGE_BUCKET }}
          TF_VAR_object_storage_access_key: ${{ secrets.OBJECT_STORAGE_ACCESS_KEY }}
          TF_VAR_object_storage_secret_key: ${{ secrets.OBJECT_STORAGE_SECRET_KEY }}
          TF_VAR_smtp_host: ${{ secrets.SMTP_HOST }}
          TF_VAR_smtp_username: ${{ secrets.SMTP_USERNAME }}
          TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD }}
          TF_VAR_smtp_from_email: ${{ secrets.SMTP_FROM_EMAIL }}
        run: terraform apply -auto-approve tfplan
