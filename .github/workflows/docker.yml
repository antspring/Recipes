name: Docker

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev

env:
  DOTNET_VERSION: 10.0.x
  API_IMAGE_NAME: recipes-api
  MIGRATIONS_IMAGE_NAME: recipes-migrations
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Recipes.slnx

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          namespace="${DOCKERHUB_USERNAME:-$GITHUB_REPOSITORY_OWNER}"
          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tag_prefix="pr-${{ github.event.pull_request.number }}"
          else
            tag_prefix="manual-${{ github.run_number }}"
          fi
          echo "api_image=${namespace}/${{ env.API_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "migrations_image=${namespace}/${{ env.MIGRATIONS_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "run_tag=${tag_prefix}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${tag_prefix}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: ${{ (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.run_tag }}
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.sha_tag }}

      - name: Build and push migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrations
          push: ${{ (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ steps.meta.outputs.migrations_image }}:${{ steps.meta.outputs.run_tag }}
            ${{ steps.meta.outputs.migrations_image }}:${{ steps.meta.outputs.sha_tag }}
